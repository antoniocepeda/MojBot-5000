<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MojBot Ops Panel</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; padding: 20px; max-width: 1100px; margin: 0 auto; color: #1a1a1a; background: #fafafa; }
    header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 16px; border-bottom: 1px solid #e5e5e5; }
    header h1 { margin: 0; font-size: 1.4rem; }
    header div { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: #666; }
    main { margin-top: 24px; }

    /* Forms */
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.9rem;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
    }
    .form-actions { display: flex; gap: 10px; margin-top: 20px; }

    /* Buttons */
    button { padding: 8px 16px; cursor: pointer; border: 1px solid #d1d5db; border-radius: 6px; background: #fff; font-size: 0.85rem; transition: all 0.15s; }
    button:hover { background: #f3f4f6; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Fleet Table */
    .fleet-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
    .fleet-table th, .fleet-table td { border: 1px solid #e5e7eb; padding: 10px 12px; text-align: left; font-size: 0.9rem; }
    .fleet-table th { background: #f9fafb; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.03em; color: #6b7280; }
    .fleet-table tbody tr:hover { background: #f0f7ff; }
    .header-actions { display: flex; justify-content: space-between; align-items: center; }
    .header-actions h2 { margin: 0; }
    .filters { display: flex; gap: 10px; margin-bottom: 0; margin-top: 16px; }
    .filters input, .filters select { padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.9rem; }
    .filters input { flex: 1; }

    /* Status dot */
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

    /* Fleet action buttons */
    .actions-cell { display: flex; gap: 6px; }
    .manage-btn { background: #3b82f6; color: #fff; border: none; font-weight: 500; }
    .manage-btn:hover { background: #2563eb; }
    .edit-btn-small { font-size: 0.8rem; padding: 6px 10px; color: #6b7280; }

    /* Bot Detail */
    .bot-detail-view { display: flex; flex-direction: column; gap: 24px; }
    .detail-nav { display: flex; justify-content: space-between; align-items: center; }
    .back-btn { background: none; border: none; color: #3b82f6; font-weight: 500; padding: 4px 0; }
    .back-btn:hover { color: #1d4ed8; background: none; }
    .edit-link { font-size: 0.85rem; color: #6b7280; }

    /* Bot Info Card */
    .bot-info-card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px 24px; }
    .bot-info-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .bot-info-header h2 { margin: 0; font-size: 1.3rem; }
    .status-badge { color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .bot-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 32px; }
    .bot-info-item { display: flex; flex-direction: column; gap: 2px; }
    .info-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; color: #9ca3af; font-weight: 600; }
    .info-value { font-size: 0.95rem; }
    .info-value.mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.88rem; letter-spacing: 0.02em; }

    /* Update Section */
    .update-section { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px 24px; }
    .update-section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .update-section-header h3 { margin: 0; font-size: 1.1rem; }
    .staged-count { font-size: 0.8rem; color: #9ca3af; }

    /* Tabs */
    .detail-tabs { display: flex; gap: 0; border-bottom: 2px solid #e5e7eb; margin-bottom: 20px; }
    .tab-btn { border: none; background: none; padding: 10px 20px; font-size: 0.9rem; font-weight: 500; color: #9ca3af; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; display: flex; align-items: center; gap: 8px; border-radius: 0; }
    .tab-btn:hover { color: #3b82f6; background: none; }
    .tab-btn.active { color: #3b82f6; border-bottom-color: #3b82f6; }
    .tab-count { background: #3b82f6; color: #fff; font-size: 0.7rem; padding: 1px 7px; border-radius: 10px; font-weight: 600; }

    /* Update Items */
    .update-items-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; min-height: 48px; }
    .update-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; transition: background 0.1s; }
    .update-item:hover { background: #f0f4ff; }
    .update-item-content { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
    .update-item-tag { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; padding: 3px 8px; border-radius: 4px; background: #e5e7eb; color: #4b5563; white-space: nowrap; }
    .update-item-tag.tag-greeting { background: #dcfce7; color: #166534; }
    .update-item-tag.tag-farewell { background: #fef3c7; color: #92400e; }
    .update-item-tag.tag-encouragement { background: #ede9fe; color: #5b21b6; }
    .update-item-tag.tag-play { background: #dbeafe; color: #1e40af; }
    .update-item-tag.tag-idle { background: #f3f4f6; color: #6b7280; }
    .update-item-tag.tag-wave { background: #dcfce7; color: #166534; }
    .update-item-tag.tag-dance { background: #fce7f3; color: #9d174d; }
    .update-item-tag.tag-nod { background: #dbeafe; color: #1e40af; }
    .update-item-tag.tag-spin { background: #fef3c7; color: #92400e; }
    .update-item-tag.tag-bow { background: #ede9fe; color: #5b21b6; }
    .update-item-tag.tag-wiggle { background: #ffedd5; color: #9a3412; }
    .update-item-text { font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .update-item-meta { font-size: 0.78rem; color: #9ca3af; white-space: nowrap; }
    .remove-btn { background: none; border: none; color: #d1d5db; font-size: 1rem; padding: 4px 6px; line-height: 1; border-radius: 4px; }
    .remove-btn:hover { color: #ef4444; background: #fef2f2; }
    .empty-state { color: #9ca3af; font-size: 0.88rem; text-align: center; padding: 16px 0; margin: 0; }

    /* Add Form */
    .add-update-form { display: flex; gap: 8px; align-items: center; padding-top: 4px; border-top: 1px solid #f3f4f6; }
    .add-update-form select { padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.85rem; min-width: 120px; }
    .add-update-form input[type="text"] { flex: 1; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.85rem; }
    .add-update-form .duration-input { width: 100px; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.85rem; }
    .add-btn { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; font-weight: 600; white-space: nowrap; }
    .add-btn:hover { background: #dcfce7; }

    /* Push Update Bar */
    .push-update-bar { display: flex; justify-content: space-between; align-items: center; background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 16px 24px; }
    .push-update-summary { display: flex; gap: 8px; align-items: center; font-size: 0.88rem; color: #6b7280; }
    .summary-dot { color: #d1d5db; }
    .push-btn { background: #3b82f6; color: #fff; border: none; font-weight: 600; padding: 10px 24px; font-size: 0.95rem; }
    .push-btn:hover:not(:disabled) { background: #2563eb; }
    .push-btn:disabled { background: #93c5fd; }

    /* Current Config */
    .current-config { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 20px 24px; }
    .current-config-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .current-config-header h3 { margin: 0; font-size: 1.1rem; }
    .config-group { margin-bottom: 12px; }
    .config-group:last-child { margin-bottom: 0; }
    .config-group h4 { margin: 0 0 8px 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; color: #9ca3af; }
    .config-items { display: flex; flex-direction: column; gap: 6px; }
    .config-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #f9fafb; border: 1px solid #f3f4f6; border-radius: 6px; font-size: 0.88rem; }

    /* Push error */
    .push-error { color: #ef4444; font-size: 0.85rem; }

    /* Toast */
    .push-toast { position: fixed; bottom: 24px; right: 24px; background: #16a34a; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 0.9rem; font-weight: 500; box-shadow: 0 4px 16px rgba(0,0,0,0.15); animation: toast-in 0.3s ease; }
    @keyframes toast-in { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body>
  <div id="app">
    <!-- The app will be rendered here -->
    <p>Loading Ops Panel...</p>
  </div>
  <script type="module" src="../src/ops/app.js"></script>
</body>
</html>
